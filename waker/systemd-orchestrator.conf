# Drop-in systemd pour activer le mode orchestrator sur Spark A.
# A copier sur Spark A uniquement (Spark B reste en mode worker):
#
#   sudo mkdir -p /etc/systemd/system/transcode-waker.service.d
#   sudo cp /home/pablo/transcode-waker/systemd-orchestrator.conf \
#       /etc/systemd/system/transcode-waker.service.d/orchestrator.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart transcode-waker
#
# Verif: systemctl show transcode-waker -p Environment

[Service]
# Backend B (Spark B waker) via lien direct ConnectX-7 200 Gbps
Environment=BACKEND_B_URL=http://10.0.0.2:8000
# Max running par Spark (correspond a MAX_CONCURRENT_JOBS du container = 4)
Environment=MAX_RUNNING_LOCAL=4
# Seuil cumule de POSTs pour basculer en mode batch (least-loaded A/B).
# threshold=3 = bascule des le 4eme POST (compatible PARALLEL=4 client).
# Reset auto quand cluster vraiment idle.
Environment=BATCH_THRESHOLD=3
