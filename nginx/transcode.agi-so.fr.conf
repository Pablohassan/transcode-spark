# =============================================================================
# transcode.agi-so.fr - Transcode service (ffmpeg + NVENC sur Spark A)
# Backend: 192.168.1.31:8000 (waker -> container :8001 sur Spark A)
# Auth: Basic Auth via /etc/nginx/.htpasswd-transcode
# Created: 2026-05-24
# =============================================================================

# Map WebSocket (pour future-proof si on ajoute SSE / WebSocket plus tard)
map $http_upgrade $connection_upgrade_transcode {
    default upgrade;
    ''      close;
}

# Rate limit (anti brute-force Basic Auth + anti-DoS sur le GPU)
# 600 req/min = 10/sec sustain. PARALLEL=4 + polling 2s = 2/sec polling,
# + POST/GET output/DELETE en pointe -> 5x marge confortable.
# Burst=50 absorbe les bursts de demarrage batch (POST jobs initiaux).
# Protection brute-force OK (10/sec sur Basic Auth = pas exploitable).
limit_req_zone  $binary_remote_addr zone=transcode_api:10m  rate=600r/m;
limit_conn_zone $binary_remote_addr zone=transcode_conn:10m;

# ========== HTTP -> HTTPS ==========
server {
    listen 80;
    listen [::]:80;
    server_name transcode.agi-so.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ========== transcode.agi-so.fr (HTTPS - acces restreint) ==========
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name transcode.agi-so.fr;

    ssl_certificate     /etc/letsencrypt/live/transcode.agi-so.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transcode.agi-so.fr/privkey.pem;
    include snippets/ssl-params.conf;
    include snippets/security-headers.conf;

    # Logs dedies (utile pour audit + debug)
    access_log /var/log/nginx/transcode-access.log combined;
    error_log  /var/log/nginx/transcode-error.log  warn;

    # Basic Auth (cle de la securite acces)
    auth_basic           "transcode-service";
    auth_basic_user_file /etc/nginx/.htpasswd-transcode;

    # Gros uploads (videos jusqu'a 12 GB)
    client_max_body_size 12G;
    client_body_timeout  7200s;
    send_timeout         7200s;

    # Rate limit (relaxes pour batch legitime)
    limit_req  zone=transcode_api  burst=50 nodelay;
    limit_conn transcode_conn      8;

    # Healthcheck du waker sans auth (pour monitoring externe / Prometheus blackbox)
    location = /waker/health {
        auth_basic off;
        proxy_pass http://192.168.1.31:8000/waker/health;
        access_log off;
    }

    # ====================================================================
    # Doc publique (sans auth) - permet auto-onboarding d'agents Claude Code
    # Pattern: doc publique + token prive (cf. stripe.com/docs vs cles secretes)
    # Fichiers servis depuis /var/www/transcode/ sur le Pi nginx
    # ====================================================================
    location = /agents.md {
        auth_basic off;
        root /var/www/transcode;
        try_files /AGENTS.md =404;
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        access_log off;
    }
    location = /readme.md {
        auth_basic off;
        root /var/www/transcode;
        try_files /README.md =404;
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        access_log off;
    }
    location = /llms.txt {
        auth_basic off;
        root /var/www/transcode;
        try_files /llms.txt =404;
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        access_log off;
    }
    location = /transcode-api-client.sh {
        auth_basic off;
        root /var/www/transcode;
        try_files /transcode-api-client.sh =404;
        default_type "text/x-shellscript; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        access_log off;
    }

    location / {
        proxy_pass http://192.168.1.31:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade_transcode;

        # Streaming - NE PAS bufferiser (cf. TLS Pi 4 ~460 Mbps single-core)
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;

        # Timeouts longs pour gros transcodes (AV1 4K -> jusqu'a 30 min)
        proxy_connect_timeout 10s;
        proxy_send_timeout    7200s;
        proxy_read_timeout    7200s;
    }
}
